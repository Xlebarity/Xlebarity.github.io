<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GmovieA Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-size: 16px; }
    </style>
</head>
<body>

    <div id="loading">🎬 Загрузка плеера FlixCDN...</div>
    <div id="player-container" style="width:100%; height:100%;"></div>

    <script>
        // Инициализируем Telegram Web App
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        const urlParams = new URLSearchParams(window.location.search);
        // Принимаем из бота именно IMDB ID (он начинается на tt)
        const imdbId = urlParams.get('imdb'); 

        if (imdbId) {
            const container = document.getElementById('player-container');
            const loader = document.getElementById('loading');
            
            const iframe = document.createElement('iframe');
            
            // Ссылка строго по присланной документации (вывод по IMDB ID)
            // Добавили параметр fullheight=1 для правильного отображения на весь экран смартфона
            iframe.src = `https://tarantino.factorios.live/show/show/imdb/${imdbId}?fullheight=1`;
            iframe.allowFullscreen = true;
            
            iframe.onload = function() {
                if (loader) loader.style.display = 'none';
            };

            container.appendChild(iframe);
        } else {
            document.getElementById('loading').innerText = 'Ошибка: Не передан ID фильма.';
        }
    </script>
</body>
</html>
