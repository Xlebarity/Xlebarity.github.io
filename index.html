<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GmovieA Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        #player-container { width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
        .error-msg { color: #ffffff; text-align: center; font-family: sans-serif; padding: 20px; }
    </style>
</head>
<body>
    <div id="player-container"></div>

    <script type="text/javascript">
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Открываем сразу на весь экран

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Бот пришлет закодированную ссылку в параметре ?player=...
        const playerUrl = getQueryParam('player');
        const container = document.getElementById('player-container');

        if (playerUrl) {
            const iframe = document.createElement('iframe');
            // Декодируем URL обратно (из %3A%2F%2F в ://)
            iframe.src = decodeURIComponent(playerUrl);
            
            iframe.setAttribute('allowfullscreen', 'true');
            iframe.setAttribute('webkitallowfullscreen', 'true');
            iframe.setAttribute('mozallowfullscreen', 'true');
            iframe.setAttribute('allow', 'autoplay; encrypted-media; gyroscope; picture-in-picture');
            
            container.appendChild(iframe);
        } else {
            container.innerHTML = "<div class='error-msg'><h3>Ошибка: Плеер не передан 🎬</h3></div>";
        }
    </script>
</body>
</html>
