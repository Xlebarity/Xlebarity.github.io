<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GmovieA Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        .kinobox_player { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="kinobox_player"></div>

    <script>
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const tmdbId = urlParams.get('tmdb');

    if (tmdbId) {
        const iframe = document.createElement('iframe');
        // Плеер Collaps (база СНГ, строго на русском)
        iframe.src = `https://api.delivembbed.cc/embed/tmdb/${tmdbId}`;
        iframe.allowFullscreen = true;
        document.body.appendChild(iframe);
    }
</script>
</body>
</html>
