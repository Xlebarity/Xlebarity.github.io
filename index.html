<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GmovieA Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        .kinobox_player { width: 100%; height: 100%; border: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-size: 16px; }
    </style>
</head>
<body>

    <div id="loading">🎬 Поиск источников для вас...</div>
    <div class="kinobox_player"></div>

    <script src="https://kinobox.tv/assets/kinobox.js"></script>
    <script>
        // Инициализируем Telegram Web App
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); // Принудительно разворачиваем окно на весь экран телефона

        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb');

        if (tmdbId) {
            kbox('.kinobox_player', {
                search: { tmdb: tmdbId },
                menu: { default: 'custom' },
                done: function() {
                    // Плеер успешно загрузился — скрываем текст загрузки
                    const loader = document.getElementById('loading');
                    if (loader) loader.style.display = 'none';
                }
            });
        } else {
            document.getElementById('loading').innerText = 'Ошибка: Не передан ID фильма.';
        }
    </script>
</body>
</html>
