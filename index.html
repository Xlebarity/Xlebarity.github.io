<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GmovieA Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        #player-container { width: 100%; height: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .error-msg { color: #ffffff; text-align: center; font-family: sans-serif; padding: 20px; }
    </style>
</head>
<body>
    <div id="player-container"></div>

    <script type="text/javascript">
        const tg = window.Telegram.WebApp;
        tg.ready();

        // --- АКТИВАЦИЯ FULLSCREEN (Mini Apps 2.0) ---
        try {
            // Проверяем, поддерживает ли текущая версия Telegram настоящий Fullscreen
            if (typeof tg.requestFullscreen === 'function') {
                tg.requestFullscreen();
            } else {
                // Если Telegram старый — просто вытягиваем шторку вверх
                tg.expand();
            }

            // Принудительно блокируем ориентацию в альбомном (горизонтальном) режиме для удобного просмотра кино
            if (typeof tg.lockOrientation === 'function') {
                tg.lockOrientation();
            }
        } catch (e) {
            console.error("Ошибка активации полноэкранного режима Telegram:", e);
            // Фолбек на случай непредвиденных ошибок API
            tg.expand(); 
        }
        // ---------------------------------------------

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Бот пришлет закодированную ссылку в параметре ?player=...
        const playerUrl = getQueryParam('player');
        const container = document.getElementById('player-container');

        if (playerUrl) {
            const iframe = document.createElement('iframe');
            // Декодируем URL обратно (из %3A%2F%2F в ://)
            iframe.src = decodeURIComponent(playerUrl);
            
            iframe.setAttribute('allowfullscreen', 'true');
            iframe.setAttribute('webkitallowfullscreen', 'true');
            iframe.setAttribute('mozallowfullscreen', 'true');
            // Добавлено 'fullscreen', чтобы iframe имел легальный доступ к полноэкранному API браузера внутри WebView
            iframe.setAttribute('allow', 'autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen');
            
            container.appendChild(iframe);
        } else {
            container.innerHTML = "<div class='error-msg'><h3>Ошибка: Плеер не передан 🎬</h3></div>";
        }
    </script>
</body>
</html>
